[mod-setting-name]
RBCF_limit_radius_setting=Baubereich Begrenzung
RBCF_use_limit_when_off_setting=Mod AUS -> Begrenzung verwenden?

[mod-setting-description]
RBCF_limit_radius_setting=Machen dir keine Sorgen um die Performance!!! Der Mod ist hochoptimiert und unterstützt selbst die größten Baubereiche ohne Probleme!!!\n\nDiese Einstellung dient zur Begrenzung der maximalen Baufläche. Wenn du denkst, dass die von dir genutzte Fläche zu groß ist und dem Gameplay im weg steht , kannst du die Fläche hier begrenzen, sodass sie nicht über den festgelegten Wert hinauswächst. Wenn die Begrenzung größer ist als die maximale Baufläche, die deine Ausrüstung unterstützt, wird nur diese maximale Fläche verwendet.
RBCF_use_limit_when_off_setting=Diese Einstellung gilt nur, wenn der Mod über die schaltflächen (die knöpfe neben der Schnellzugriffsleiste für Items) ausgeschaltet ist.\n-------------------------------------------------\nEinstellung AN:\nDie Begrenzung der Baufläche gilt, wenn der Mod ausgeschaltet ist.\n-------------------------------------------------\nEinstellung AUS:\nDie maximale Baufläche der aktuellen Ausrüstung wird verwendet, wenn der Mod ausgeschaltet ist.

[shortcut]
shortcut-toggle-robots-build-closest-first=AN/AUS Robots-Build-Closest-First Mod

[controls]
input-toggle-robots-build-closest-first=Umschalten AN/AUS